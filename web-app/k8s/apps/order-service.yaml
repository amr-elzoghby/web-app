apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce-apps      
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 323398832779.dkr.ecr.me-south-1.amazonaws.com/order-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce-apps
spec:
  selector:
    app: order-service
  ports:
    - port: 3004
      targetPort: 3004
