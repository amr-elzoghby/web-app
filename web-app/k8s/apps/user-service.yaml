apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce-apps        # ← الـ namespace بتاعه
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 323398832779.dkr.ecr.me-south-1.amazonaws.com/user-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI


---

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce-apps
spec:
  selector:
    app: user-service
  ports:
    - port: 3001
      targetPort: 3001
