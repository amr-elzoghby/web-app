<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopMicro | E-Commerce</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav class="navbar">
    <div class="nav-brand">🛒 ShopMicro</div>
    <div class="nav-links">
      <a href="#" onclick="showSection('catalog')">Products</a>
      <a href="#" onclick="showSection('cart')">Cart <span id="cart-count" class="badge">0</span></a>
      <a href="#" onclick="showSection('orders')">My Orders</a>
    </div>
    <div class="nav-auth" id="nav-auth">
      <button onclick="showSection('login')" class="btn btn-outline">Login</button>
      <button onclick="showSection('register')" class="btn btn-primary">Register</button>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <span id="username-display"></span>
      <button onclick="logout()" class="btn btn-outline">Logout</button>
    </div>
  </nav>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast hidden"></div>

  <!-- ===== MAIN ===== -->
  <main class="container">

    <!-- LOGIN -->
    <section id="section-login" class="auth-box hidden">
      <h2>Login</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit" class="btn btn-primary full-width">Login</button>
      </form>
      <p>Don't have an account? <a href="#" onclick="showSection('register')">Register</a></p>
    </section>

    <!-- REGISTER -->
    <section id="section-register" class="auth-box hidden">
      <h2>Register</h2>
      <form id="register-form">
        <input type="text" id="reg-name" placeholder="Full Name" required />
        <input type="email" id="reg-email" placeholder="Email" required />
        <input type="password" id="reg-password" placeholder="Password" required />
        <button type="submit" class="btn btn-primary full-width">Create Account</button>
      </form>
      <p>Already have an account? <a href="#" onclick="showSection('login')">Login</a></p>
    </section>

    <!-- CATALOG -->
    <section id="section-catalog" class="hidden">
      <div class="section-header">
        <h2>🛍️ Products</h2>
        <input type="text" id="search-input" placeholder="Search products..." oninput="filterProducts()" />
      </div>
      <div id="products-grid" class="products-grid">
        <div class="loading">Loading products...</div>
      </div>
    </section>

    <!-- CART -->
    <section id="section-cart" class="hidden">
      <h2>🛒 Your Cart</h2>
      <div id="cart-items"></div>
      <div id="cart-summary" class="cart-summary hidden">
        <div class="cart-total">Total: $<span id="cart-total">0.00</span></div>
        <button class="btn btn-primary" onclick="checkout()">Proceed to Checkout</button>
      </div>
      <p id="cart-empty" class="empty-msg">Your cart is empty.</p>
    </section>

    <!-- ORDERS -->
    <section id="section-orders" class="hidden">
      <h2>📦 My Orders</h2>
      <div id="orders-list"></div>
      <p id="orders-empty" class="empty-msg hidden">No orders yet.</p>
    </section>

    <!-- CHECKOUT -->
    <section id="section-checkout" class="auth-box hidden">
      <h2>💳 Checkout</h2>
      <form id="payment-form">
        <h3>Shipping Details</h3>
        <input type="text" id="ship-address" placeholder="Address" required />
        <input type="text" id="ship-city" placeholder="City" required />
        <h3>Payment Details</h3>
        <input type="text" id="card-number" placeholder="Card Number (16 digits)" maxlength="16" required />
        <div class="row-2">
          <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required />
          <input type="text" id="card-cvv" placeholder="CVV" maxlength="3" required />
        </div>
        <button type="submit" class="btn btn-primary full-width">Place Order</button>
        <button type="button" class="btn btn-outline full-width" onclick="showSection('cart')">Back to Cart</button>
      </form>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
