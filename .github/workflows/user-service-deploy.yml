# =============================================================================
# User Service — Build & Deploy to Production
# Triggers on push to main when user-service code changes
# =============================================================================
name: "Backend: Deploy User Service"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/ecommerce-microservices/services/user-service/**"
  pull_request:
    branches: ["main", "feature/*"]
    paths:
      - "web-app/ecommerce-microservices/services/user-service/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./web-app/ecommerce-microservices/services/user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/webapp-user-service:v${{ github.run_number }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::644981759771:role/GitHubActionRole
          aws-region: us-east-1

      - name: Update GitOps Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/3MR-MLops/web-app-gitops.git gitops-repo

          cd gitops-repo
          # Update tag while preserving indentation
          sed -i '/image: webapp-user-service/{n;s/\(tag: \).*/\1"v${{ github.run_number }}"/}' deployment.yaml

          if [ -n "$(git status --porcelain)" ]; then
            git add deployment.yaml
            git commit -m "Update user-service image tag to v${{ github.run_number }} [skip ci]"
            git push
          else
            echo "No changes detected in deployment.yaml"
          fi
