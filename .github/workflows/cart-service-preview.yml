# =============================================================================
# Cart Service — PR Preview Environment
# Creates a temporary preview environment when a PR is labeled 'pr-deploy'
# =============================================================================
name: "Backend: PR Preview Cart Service"

on:
  pull_request:
    types: [labeled]
    paths:
      - "web-app/ecommerce-microservices/services/cart-service/**"

jobs:
  build-and-preview:
    if: github.event.label.name == 'pr-deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./web-app/ecommerce-microservices/services/cart-service
          file: ./web-app/ecommerce-microservices/services/cart-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/webapp-cart-service:${{ env.IMAGE_TAG }}

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: 3MR-MLops/web-app-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-folder

      - name: Create Temporary Manifest
        run: |
          cd gitops-folder
          cp deployment.yaml deployment-cart-service-${{ env.IMAGE_TAG }}.yaml
          sed -i '/image: webapp-cart-service/{n;s/tag: .*/tag: "${{ env.IMAGE_TAG }}"/}' deployment-cart-service-${{ env.IMAGE_TAG }}.yaml

      - name: Push to GitOps Repo
        run: |
          cd gitops-folder
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"
          git add deployment-cart-service-${{ env.IMAGE_TAG }}.yaml
          git commit -m "Deploy cart-service preview for ${{ env.IMAGE_TAG }}"
          git push
