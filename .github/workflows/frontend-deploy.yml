# =============================================================================
# Frontend — Build & Deploy to Production
# Triggers on push to main when frontend code changes
# =============================================================================
name: "Frontend: Deploy"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/frontend/**"
  pull_request:
    branches: ["main", "feature/*"]
    paths:
      - "web-app/frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./web-app/frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/webapp-frontend:v${{ github.run_number }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::644981759771:role/GitHubActionRole
          aws-region: us-east-1

      - name: Update GitOps Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/3MR-MLops/web-app-gitops.git gitops-repo

          cd gitops-repo
          # Update only the frontend tag (line after 'image: webapp-frontend')
          sed -i '/image: webapp-frontend/{n;s/tag: .*/tag: "v${{ github.run_number }}"/}' deployment.yaml

          git add deployment.yaml
          git commit -m "Update frontend image tag to v${{ github.run_number }} [skip ci]"
          git push
