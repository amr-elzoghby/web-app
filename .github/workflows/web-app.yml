name: Deploy Frontend

on:
  push:
    branches:
      - main  
  pull_request:
    branches: [ "main" ]
    
    paths:
      - 'web-app/frontend/**'  

jobs:
  build-and-deploy:

    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
  
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./web-app/frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/webapp-frontend:latest

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
           role-to-assume: arn:aws:iam::644981759771:role/GitHubActionRole 
           aws-region: us-east-1

    - name: Deploy to EC2 via SSM
      run: |
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:Name,Values=web-server" \
          --parameters 'commands=["cd /home/ubuntu/ecommerce-microservices", "sudo docker-compose pull nginx", "sudo docker-compose up -d nginx"]'
