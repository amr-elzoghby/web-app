name: Deploy PR Preview

on:
  pull_request:
    types: [labeled]

jobs:
  build-and-update:
    if: github.event.label.name == 'pr-deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          echo "Building image for ${{ env.IMAGE_TAG }}..."
          docker build -t 3mrlmlops/webapp-frontend:${{ env.IMAGE_TAG }} .
          docker push 3mrlmlops/webapp-frontend:${{ env.IMAGE_TAG }}
          
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: 3MR-MLops/web-app-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-folder 

      - name: Create Temporary Manifest
        run: |
          cd gitops-folder
          cp deployment.yaml deployment-${{ env.IMAGE_TAG }}.yaml
          sed -i "s|image: .*|image: 3mrlmlops/webapp-frontend:${{ env.IMAGE_TAG }}|g" deployment-${{ env.IMAGE_TAG }}.yaml

      - name: Push new file to GitOps Repo
        run: |
          cd gitops-folder
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"
          git add deployment-${{ env.IMAGE_TAG }}.yaml
          git commit -m "Deploy preview environment for ${{ env.IMAGE_TAG }}"
          git push