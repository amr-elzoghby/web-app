name: Deploy PR Preview

on:
  pull_request:
    types: [labeled]

jobs:
  check-and-name: 

    if: github.event.label.name == 'pr-deploy'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Dynamic Name
        id: set-name
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          DEPLOY_NAME="v${PR_NUMBER}-pr"
          
          echo "The dynamic name is: $DEPLOY_NAME"
          
          echo "DEPLOY_NAME=$DEPLOY_NAME" >> $GITHUB_ENV

      - name: Print Confirmation
        run: |
          echo "The dynamic name is : ${{ env.DEPLOY_NAME }}